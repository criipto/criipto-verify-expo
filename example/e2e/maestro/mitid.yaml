appId: eu.idura.example
name: mitid-login
---
- launchApp:
    clearState: true
- tapOn: "Login with Danish MitID"
- tapOn: "Continue"
- tapOn: "Open MitID App"
- assertVisible: "Enter PIN"
- tapOn: "1"
- tapOn: "1"
- tapOn: "2"
- tapOn: "2"
- tapOn: "3"
- tapOn: "3"
- swipe:
    start: 25%, 90%
    end: 75%, 90%
- tapOn: "Continue to.*"
- assertVisible: "Logged in!"


