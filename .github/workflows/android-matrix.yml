name: android-matrix
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  android-build:
    name: Android build (Expo SDK ${{ matrix.sdk }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [54, 55]
    env:
      FIXTURE: examples/sdk${{ matrix.sdk }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-sdk${{ matrix.sdk }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-sdk${{ matrix.sdk }}-

      - name: Install library deps
        run: npm ci

      - name: Build library (dist/)
        run: npm run build

      - name: Install fixture deps
        working-directory: ${{ env.FIXTURE }}
        run: npm install --no-audit --no-fund

      - name: Align fixture deps to Expo SDK ${{ matrix.sdk }}
        working-directory: ${{ env.FIXTURE }}
        run: npx expo install --fix

      - name: Expo prebuild (android)
        working-directory: ${{ env.FIXTURE }}
        run: npx expo prebuild --platform android --clean --no-install

      - name: Gradle assembleDebug
        working-directory: ${{ env.FIXTURE }}/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
